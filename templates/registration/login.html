{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Ideal Class{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card card-glass p-5 border-0">
            <h2 class="text-center fw-bold mb-4 display-5">Welcome Back</h2>
            <p class="text-center text-glass-muted mb-4 fs-5">Log in to your account</p>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-glass w-100 py-3 mt-4 fw-bold fs-5 shadow">Login Now</button>
            </form>
            <p class="text-center mt-4 mb-0 text-glass-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-white fw-bold">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
